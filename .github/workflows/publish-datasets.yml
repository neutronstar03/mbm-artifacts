name: Publish Datasets

on:
  workflow_dispatch:
  schedule:
    - cron: 17 3 * * *

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.change-check.outputs.changed }}
    steps:
      - name: Checkout artifacts repo
        uses: actions/checkout@v4

      - name: Checkout morpho-blue-markets
        uses: actions/checkout@v4
        with:
          repository: neutronstar03/morpho-blue-markets
          ref: main
          path: src

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install deps
        working-directory: src
        run: bun install --frozen-lockfile

      - name: Seed previous datasets (best effort)
        working-directory: src
        run: |
          set -euo pipefail
          base="https://neutronstar03.github.io/mbm-artifacts/v1"
          for f in whitelist.collaterals.json blacklist.markets.json unhealthy.markets.json oracle-providers.json; do
            url="$base/$f"
            echo "Seeding from: $url"
            if curl -fsSL "$url" -o "public/$f"; then
              echo "Seeded public/$f"
            else
              echo "No seed for $f (ok)."
            fi
          done

      - name: Generate datasets
        working-directory: src
        run: |
          set -euo pipefail
          bun run gen:whitelist:collaterals
          bun run gen:blacklist:markets
          bun run gen:oracle-providers

      - name: Assemble Pages site
        run: |
          set -euo pipefail
          mkdir -p site/v1
          cp "src/public/whitelist.collaterals.json" "site/v1/whitelist.collaterals.json"
          cp "src/public/blacklist.markets.json" "site/v1/blacklist.markets.json"
          cp "src/public/oracle-providers.json" "site/v1/oracle-providers.json"
          cp "src/public/unhealthy.markets.json" "site/v1/unhealthy.markets.json"

          generatedAt="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sourceSha="$(git -C src rev-parse HEAD)"
          whitelistSha="$(sha256sum site/v1/whitelist.collaterals.json | awk '{print $1}')"
          blacklistSha="$(sha256sum site/v1/blacklist.markets.json | awk '{print $1}')"
          oracleProvidersSha="$(sha256sum site/v1/oracle-providers.json | awk '{print $1}')"
          unhealthyMarketsSha="$(sha256sum site/v1/unhealthy.markets.json | awk '{print $1}')"
          cat > site/v1/index.json <<EOF
          {
            "version": 1,
            "generatedAt": "${generatedAt}",
            "source": {
              "repo": "neutronstar03/morpho-blue-markets",
              "ref": "main",
              "sha": "${sourceSha}"
            },
            "files": {
              "whitelist.collaterals.json": {
                "sha256": "${whitelistSha}"
              },
              "blacklist.markets.json": {
                "sha256": "${blacklistSha}"
              },
              "oracle-providers.json": {
                "sha256": "${oracleProvidersSha}"
              },
              "unhealthy.markets.json": {
                "sha256": "${unhealthyMarketsSha}"
              }
            }
          }
          EOF

      - name: Check for dataset changes
        id: change-check
        run: |
          set -euo pipefail
          base="https://neutronstar03.github.io/mbm-artifacts/v1"
          changed="false"
          for f in whitelist.collaterals.json blacklist.markets.json unhealthy.markets.json oracle-providers.json; do
            if ! curl -fsSL "$base/$f" -o "/tmp/$f"; then
              echo "$f is new"
              changed="true"
              continue
            fi
            oldSha="$(sha256sum "/tmp/$f" | awk '{print $1}')"
            newSha="$(sha256sum "site/v1/$f" | awk '{print $1}')"
            if [ "$oldSha" != "$newSha" ]; then
              echo "$f changed: $oldSha -> $newSha"
              changed="true"
            else
              echo "$f unchanged"
            fi
          done
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        if: steps.change-check.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
